<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Landpage - Avalume</title>

  <!-- Estilos globais -->

</head>
<body>
  <!-- Navegação -->



<header>
  <nav id="nav-container"></nav> <!-- Menu Dinâmico -->
  <div id="search-container">
    <input type="text" id="search-input" placeholder="Buscar..." />
    <button id="search-button">Pesquisar</button>
  </div>
</header>



<!-- Dropdown e Resultados -->
<div id="search-results-container">
  <div id="search-dropdown">
    <button id="close-search-dropdown">X</button>
    <div id="search-results">
      <p>Digite algo para buscar ou clique no botão.</p>
    </div>
  </div>
</div>

  <!-- Conteúdo Dinâmico -->
  <div id="dynamic-content">
    <!-- Conteúdo carregado dinamicamente -->
  </div>

  <!-- Rodapé -->
  <footer id="footer-container"></footer>

<script>
  /**
   * Config.js - Configurações Globais
   */
  const appConfig = {
    siteMode: 'single-page', // single-page ou landpage
    theme: 'light', // light ou dark
    enableSearch: true,
    enableModal: true,
  };

  const updateSiteMode = (mode) => {
    if (['single-page', 'landpage'].includes(mode)) {
      appConfig.siteMode = mode;
      console.log(`[Config] Modo do site atualizado para: ${mode}`);
    } else {
      console.warn(`[Config] Modo inválido: ${mode}`);
    }
  };

  const updateTheme = (theme) => {
    if (['light', 'dark'].includes(theme)) {
      appConfig.theme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      console.log(`[Config] Tema atualizado para: ${theme}`);
    } else {
      console.warn(`[Config] Tema inválido: ${theme}`);
    }
  };
</script>

<script>
  /**
   * Utils.js - Utilitários Gerais
   */
  const loadHTML = async (containerId, filePath) => {
    try {
      const response = await fetch(filePath);
      if (!response.ok) throw new Error(`Erro ao carregar ${filePath}`);
      const container = document.getElementById(containerId);
      container.innerHTML = await response.text();
    } catch (error) {
      console.error(`[Utils] Erro ao carregar HTML: ${error.message}`);
    }
  };

  const loadCSS = (filePath) => {
    if (!document.querySelector(`link[href="${filePath}"]`)) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = filePath;
      document.head.appendChild(link);
    }
  };

  const loadScriptForPage = (scriptPath, setupFunctionName) => {
    if (!document.querySelector(`script[src="${scriptPath}"]`)) {
      const script = document.createElement('script');
      script.src = scriptPath;
      script.onload = () => {
        if (setupFunctionName && typeof window[setupFunctionName] === 'function') {
          window[setupFunctionName]();
        }
      };
      script.onerror = () => console.error(`Erro ao carregar o script ${scriptPath}`);
      document.body.appendChild(script);
    }
  };
</script>

<script>
  /**
   * Router.js - Gerenciador de Rotas
   */
  const loadSinglePage = async (page) => {
    const dynamicContent = document.querySelector('#dynamic-content');
    dynamicContent.innerHTML = ''; // Limpa o conteúdo anterior

    // Carrega a página especificada
    await loadHTML(dynamicContent.id, `./frontend/html/pages/${page}.html`);
    loadCSS(`./frontend/css/pages/${page}.css`);
    loadScriptForPage(`./frontend/js/pages/${page}Handler.js`, `setup${capitalize(page)}`);
  };

  const loadLandpage = async () => {
    const dynamicContent = document.querySelector('#dynamic-content');
    dynamicContent.innerHTML = ''; // Limpa o conteúdo anterior

    const pages = ['home', 'about', 'contact', 'form', 'carousel', 'AdmConfig'];
    for (const page of pages) {
      const section = document.createElement('section');
      section.id = `${page}-section`;
      await loadHTML(section.id, `./frontend/html/pages/${page}.html`);
      loadCSS(`./frontend/css/pages/${page}.css`);
      loadScriptForPage(`./frontend/js/pages/${page}Handler.js`, `setup${capitalize(page)}`);
      dynamicContent.appendChild(section);
    }
  };

  const initializeRouter = async () => {
    if (appConfig.siteMode === 'landpage') {
      await loadLandpage();
    } else {
      await loadSinglePage('home'); // Página inicial padrão
    }
  };

  const capitalize = (text) => text.charAt(0).toUpperCase() + text.slice(1);
</script>

<script>
  /**
   * ThemeHandler.js - Gerenciador de Temas
   */
  const applyTheme = (theme) => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('avalume-theme', theme);
  };

  const toggleTheme = () => {
    const currentTheme = localStorage.getItem('avalume-theme') || 'light';
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    applyTheme(newTheme);

    const themeToggleButton = document.getElementById('theme-toggle-button');
    if (themeToggleButton) {
      themeToggleButton.innerText = newTheme === 'light' ? 'Alternar para Escuro' : 'Alternar para Claro';
    }
  };

  document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('avalume-theme') || 'light';
    applyTheme(savedTheme);

    const themeToggleButton = document.getElementById('theme-toggle-button');
    if (themeToggleButton) {
      themeToggleButton.innerText = savedTheme === 'light' ? 'Alternar para Escuro' : 'Alternar para Claro';
      themeToggleButton.addEventListener('click', toggleTheme);
    }
  });
</script>

<script>
  /**
   * Inicialização do Sistema
   */
  document.addEventListener('DOMContentLoaded', async () => {
    await loadHTML('nav-container', './frontend/html/globals/nav.html');
    await loadHTML('footer-container', './frontend/html/globals/footer.html');
    loadCSS('./frontend/css/globals/styles.css');
    loadCSS('./frontend/css/globals/theme.css');

    // Inicia o roteador
    await initializeRouter();
  });
</script>

</body>
</html>
