<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Router Example</title>
  <!-- Estilos globais -->
  <link rel="stylesheet" href="./frontend/css/styles.css">
  <!-- Estilos do Nav e Footer -->
  <link rel="stylesheet" href="./frontend/css/components/nav.css">
  <link rel="stylesheet" href="./frontend/css/components/footer.css">
</head>
<body>
  <!-- Navegação -->
  <header id="nav-container"></header> <!-- O Nav será carregado dinamicamente aqui -->

  <!-- Conteúdo Dinâmico -->
  <div id="dynamic-content">
    <!-- O conteúdo dinâmico das páginas será carregado aqui -->
  </div>

  <!-- Rodapé -->
  <footer id="footer-container"></footer> <!-- O Footer será carregado dinamicamente -->

  <!-- Scripts -->
  <script src="./frontend/js/components/loadComponents.js"></script>
  <script src="./frontend/js/components/router.js"></script>
</body>
</html>
